<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon.png" sizes="48x48" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#1a1f24" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="deck" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<script>
			(() => {
				const colors = { light: '#fbfcfd', dark: '#1a1f24', eink: '#ffffff' };
				const t = localStorage.getItem('deck-theme') || 'dark';
				document.documentElement.dataset.theme = t;
				const m = document.querySelector('meta[name="theme-color"]');
				if (m) m.content = colors[t] || colors.dark;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
